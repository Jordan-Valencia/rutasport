<header class="sticky top-0 z-50 bg-white shadow-sm">
  <!-- Top Banner -->
  <div class="bg-[#1a237e] text-white text-center py-2.5 text-xs font-medium tracking-wide">
    HASTA 40% DE DESCUENTO EN SELECCIÓN DE PRODUCTOS
  </div>

  <div class="flex items-center justify-between px-4 lg:px-8 py-4">
    <!-- Logo -->
    <a routerLink="/" class="flex-shrink-0">
      <span class="text-3xl font-black">CalzadoAndres</span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="hidden lg:flex items-center gap-6">
      <a routerLink="/" routerLinkActive="text-[#1a237e] border-b-2 border-[#1a237e] pb-1" class="text-sm font-bold tracking-wide hover:text-[#1a237e] transition-colors">NOVEDADES</a>
      <a routerLink="/mujer" class="text-sm font-bold tracking-wide hover:text-[#1a237e] transition-colors">MUJER</a>
      <a routerLink="/hombre" class="text-sm font-bold tracking-wide text-[#1a237e] border-b-2 border-[#1a237e] pb-1">HOMBRE</a>
      <a routerLink="/ninos" class="text-sm font-bold tracking-wide hover:text-[#1a237e] transition-colors">NIÑOS</a>
      <a routerLink="/deporte" class="text-sm font-bold tracking-wide hover:text-[#1a237e] transition-colors">DEPORTE</a>
      <a routerLink="/outlet" class="text-sm font-bold tracking-wide text-red-600 hover:text-red-700 transition-colors">OUTLET</a>
    </nav>

    <!-- Icons -->
    <div class="flex items-center gap-4">
      <div class="hidden lg:flex items-center border border-gray-300 px-4 py-2">
        <input
          type="text"
          placeholder="Buscar"
          class="bg-transparent text-sm outline-none w-48"
        />
        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </div>

      <!-- User Icon -->
      <button class="hidden lg:block" title="Mi Cuenta">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
      </button>

      <!-- Favorites Icon -->
      <button title="Favoritos">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
        </svg>
      </button>

      <!-- Cart Icon -->
      <button class="relative" title="Carrito">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
        </svg>
        <span class="absolute -top-1 -right-1 w-5 h-5 bg-[#1a237e] text-white text-xs flex items-center justify-center rounded-full">0</span>
      </button>

      <!-- Mobile Menu Button -->
      <button class="lg:hidden" (click)="toggleMobileMenu()" title="Menú">
        @if (mobileMenuOpen()) {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        } @else {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        }
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (mobileMenuOpen()) {
    <nav class="lg:hidden bg-white border-t py-6">
      <div class="flex flex-col px-4 gap-4">
        <a routerLink="/" class="text-lg font-bold">NOVEDADES</a>
        <a routerLink="/mujer" class="text-lg font-bold">MUJER</a>
        <a routerLink="/hombre" class="text-lg font-bold text-[#1a237e]">HOMBRE</a>
        <a routerLink="/ninos" class="text-lg font-bold">NIÑOS</a>
        <a routerLink="/deporte" class="text-lg font-bold">DEPORTE</a>
        <a routerLink="/outlet" class="text-lg font-bold text-red-600">OUTLET</a>
      </div>
    </nav>
  }
</header>
