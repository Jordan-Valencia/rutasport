<section class="py-16 px-4 lg:px-8 border-b-4 border-black">
  <h2 class="text-3xl lg:text-5xl font-black mb-8">
    ENCUENTRA TU EQUIPO
  </h2>

  <!-- Team Tabs -->
  <div class="flex gap-2 mb-10">
    @for (tab of ['Selecciones', 'Clubes Locales', 'Clubes']; track tab) {
      <button
        (click)="setActiveTeamTab(tab)"
        [class]="
          activeTeamTab() === tab
            ? 'bg-black text-white border-black'
            : 'bg-white text-black border-gray-300 hover:border-black'
        "
        class="px-5 py-2.5 text-sm font-bold border transition-colors"
      >
        {{ tab }}
      </button>
    }
  </div>

  <!-- Teams Grid -->
  <div class="grid grid-cols-3 lg:grid-cols-6 gap-4 lg:gap-8">
    @for (team of teams; track team.name; let i = $index) {
      <div class="group cursor-pointer text-center">
        <div class="aspect-square border border-gray-200 flex items-center justify-center mb-3 group-hover:border-black transition-colors p-4">
          <div class="w-16 h-16 lg:w-20 lg:h-20 bg-gray-100 rounded-full flex items-center justify-center">
            <span class="text-2xl font-bold text-gray-400">{{ team.name.charAt(1) }}</span>
          </div>
        </div>
        <p class="text-sm font-medium">{{ team.country }}</p>
      </div>
    }
  </div>
</section>
