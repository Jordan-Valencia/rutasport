<section class="relative h-[70vh] lg:h-[85vh] overflow-hidden">
  <!-- Background Image -->
  <div class="absolute inset-0 bg-gray-200">
    <img
      src="/images/hero-lifestyle-2.jpg"
      alt="Hero"
      class="w-full h-full object-cover"
      onerror="this.style.backgroundColor='#1a237e'; this.style.display='none'"
    />
  </div>

  <!-- Gradient Overlay -->
  <div class="absolute inset-0 bg-gradient-to-r from-[#1a237e]/90 via-[#1a237e]/60 to-transparent"></div>

  <!-- Content -->
  <div class="absolute inset-0 flex items-center">
    <div class="px-4 lg:px-16 max-w-3xl">
      <span class="inline-block border border-white/50 text-white px-4 py-1 text-xs font-bold tracking-widest mb-6">
        (CATEGORÍA)
      </span>

      <h1 class="text-white text-5xl lg:text-8xl font-black mb-6">
        (NOMBRE DE LA CAMPAÑA DEPORTIVA)
      </h1>

      <p class="text-white/80 text-lg lg:text-xl mb-8 max-w-lg">
        (Descripción inspiradora que conecte con el espíritu deportivo)
      </p>

      <div class="flex flex-wrap gap-4">
        <button class="bg-white text-[#1a237e] px-8 py-4 font-bold text-sm tracking-wide hover:bg-gray-100 transition-colors flex items-center gap-2">
          COMPRAR AHORA
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
        </button>

        <button class="border-2 border-white text-white px-8 py-4 font-bold text-sm tracking-wide hover:bg-white hover:text-[#1a237e] transition-colors flex items-center gap-3">
          <svg class="w-5 h-5 fill-current" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          VER VIDEO
        </button>
      </div>
    </div>
  </div>
</section>
