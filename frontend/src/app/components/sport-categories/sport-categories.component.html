<section class="py-16 px-4 lg:px-8">
  <h2 class="text-3xl lg:text-4xl font-black mb-8">
    COMPRAR POR DEPORTE
  </h2>

  <!-- Sport Filter Buttons -->
  <div class="flex gap-3 overflow-x-auto pb-4 mb-10">
    @for (sport of sports; track sport) {
      <button
        (click)="setActiveSport(sport)"
        [class]="
          activeSport() === sport
            ? 'bg-[#1a237e] text-white'
            : 'bg-gray-100 text-black hover:bg-gray-200'
        "
        class="px-6 py-3 text-sm font-bold whitespace-nowrap transition-colors"
      >
        {{ sport }}
      </button>
    }
  </div>

  <!-- Products Grid -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
    @for (product of products; track product.name; let i = $index) {
      <div class="group cursor-pointer">
        <div class="relative bg-[#ebedee] aspect-square mb-3">
          <img
            [src]="product.image"
            [alt]="product.name"
            class="object-contain p-4 group-hover:scale-105 transition-transform w-full h-full"
            onerror="this.parentElement.style.backgroundColor='#ccc'"
          />
          <button class="absolute top-3 right-3 w-9 h-9 bg-white rounded-full flex items-center justify-center shadow-sm opacity-0 group-hover:opacity-100 transition-opacity">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
            </svg>
          </button>
        </div>
        <p class="text-xs text-gray-500 mb-1">{{ product.category }}</p>
        <h3 class="font-bold text-sm mb-1">{{ product.name }}</h3>
        <p class="font-bold text-sm">{{ product.price }}</p>
      </div>
    }
  </div>
</section>
