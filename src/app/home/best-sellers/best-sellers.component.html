<section #bestSellersSection class="py-16 px-4 lg:px-8">
  <div class="section-heading flex items-center justify-between mb-10">
    <h2 class="text-3xl lg:text-4xl font-black">LOS MÁS VENDIDOS</h2>
    <a routerLink="/mas-vendidos" class="text-sm font-bold underline underline-offset-4 hover:text-[#1a237e]">Ver todo</a>
  </div>

  @if (loading()) {
    <div class="grid grid-cols-2 lg:grid-cols-5 gap-4">
      @for (i of [1,2,3,4,5]; track i) {
        <div class="animate-pulse">
          <div class="bg-gray-200 aspect-square mb-3"></div>
          <div class="h-3 bg-gray-200 rounded w-1/2 mb-2"></div>
          <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
          <div class="h-4 bg-gray-200 rounded w-1/3"></div>
        </div>
      }
    </div>
  } @else {
    <div class="grid grid-cols-2 lg:grid-cols-5 gap-4">
      @for (product of products(); track product.name) {
        <div class="product-card group cursor-pointer">
          <div class="relative bg-[#ebedee] aspect-square mb-3 overflow-hidden">
            <img
              [src]="product.image"
              [alt]="product.name"
              class="object-contain p-4 group-hover:scale-105 transition-transform duration-500 w-full h-full"
              onerror="this.parentElement.style.backgroundColor='#ccc'"
            />
            <button class="absolute top-3 right-3 w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-sm opacity-0 group-hover:opacity-100 transition-opacity">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
              </svg>
            </button>
            @if (product.isBestSeller) {
              <span class="absolute top-3 left-3 bg-[#1a237e] text-white px-2 py-1 text-xs font-bold">BEST SELLER</span>
            }
            @if (product.isNew) {
              <span class="absolute top-3 left-3 bg-black text-white px-2 py-1 text-xs font-bold">NUEVO</span>
            }
          </div>
          <p class="text-xs text-gray-500 mb-1">{{ product.category }}</p>
          <h3 class="font-bold text-sm mb-1">{{ product.name }}</h3>
          <p class="font-bold text-sm">{{ product.price }}</p>
        </div>
      }
    </div>
  }
</section>
