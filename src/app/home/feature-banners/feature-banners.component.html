<section #featureBannersSection class="relative overflow-hidden">

  @if (loading()) {
    <div class="h-112.5 lg:h-150 bg-gray-200 animate-pulse"></div>
  }

  @if (!loading()) {
    <!-- Carousel track -->
    <div class="carousel-track" [style]="trackStyle()">
      @for (banner of banners(); track banner.title; let i = $index) {
        <div
          class="carousel-slide relative h-112.5 lg:h-150 overflow-hidden cursor-pointer"
          [style.background-color]="banner.bgColor"
          [ngStyle]="slideStyle()"
        >
          <img
            [src]="banner.image"
            [alt]="banner.title"
            class="absolute inset-0 w-full h-full object-cover opacity-70"
            onerror="this.style.opacity='0.3'"
          />
          <div class="absolute inset-0 bg-linear-to-t from-black/80 via-black/30 to-transparent"></div>

          <div class="banner-content absolute bottom-10 left-8 right-8 text-white">
            <span class="text-xs font-bold tracking-widest opacity-70 uppercase">{{ banner.subtitle }}</span>
            <h3 class="text-3xl lg:text-5xl font-black mt-2 mb-4 leading-tight">{{ banner.title }}</h3>
            <p class="text-white/70 mb-6 max-w-lg text-sm lg:text-base">{{ banner.description }}</p>
            <button class="bg-white text-black px-6 py-3 font-bold text-sm tracking-widest hover:bg-[#1a237e] hover:text-white transition-colors duration-300">
              {{ banner.buttonText }}
            </button>
          </div>
        </div>
      }
    </div>

    <!-- Arrow left -->
    @if (banners().length > slidesPerView()) {
      <button
        (click)="prev()"
        class="carousel-arrow left-4"
        aria-label="Banner anterior"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <!-- Arrow right -->
      <button
        (click)="next()"
        class="carousel-arrow right-4"
        aria-label="Banner siguiente"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <!-- Dots -->
      <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2 z-10">
        @for (banner of banners(); track banner.title; let i = $index) {
          <button
            (click)="goTo(i)"
            class="carousel-dot"
            [class.active]="currentIndex() === i"
            [attr.aria-label]="'Ir al banner ' + (i + 1)"
          ></button>
        }
      </div>
    }
  }
</section>
