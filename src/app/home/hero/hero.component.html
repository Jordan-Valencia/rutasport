<section class="relative h-[70vh] lg:h-[85vh] overflow-hidden bg-[#1a237e]">

  @if (loading()) {
    <div class="hero-skeleton absolute inset-0">
      <div class="skeleton-img absolute inset-0 bg-[#232f8a]"></div>
      <div class="absolute inset-0 bg-linear-to-r from-[#1a237e]/90 via-[#1a237e]/55 to-transparent"></div>
      <div class="absolute inset-0 flex items-center px-4 lg:px-16">
        <div class="max-w-3xl w-full">
          <div class="skeleton-block h-5 w-24 mb-6 rounded-sm"></div>
          <div class="skeleton-block h-16 lg:h-24 w-3/4 mb-3 rounded-sm"></div>
          <div class="skeleton-block h-16 lg:h-24 w-1/2 mb-6 rounded-sm"></div>
          <div class="skeleton-block h-4 w-96 max-w-full mb-2 rounded-sm"></div>
          <div class="skeleton-block h-4 w-72 max-w-full mb-8 rounded-sm"></div>
          <div class="flex gap-4">
            <div class="skeleton-block h-14 w-40 rounded-sm"></div>
          </div>
        </div>
      </div>
    </div>
  }

  @let h = hero();
  @if (h) {
    <img
      [src]="h.imageUrl"
      [alt]="h.campaignName"
      class="hero-img absolute inset-0 w-full h-full object-cover"
    />

    <div class="absolute inset-0 bg-linear-to-r from-[#1a237e]/90 via-[#1a237e]/55 to-transparent"></div>

    <div class="hero-slide-content absolute inset-0 flex items-center">
      <div class="px-4 lg:px-16 max-w-3xl">
        <span class="hero-badge inline-block border border-white/50 text-white px-4 py-1 text-xs font-bold tracking-widest mb-6">
          {{ h.category}}
        </span>
        <h1 class="hero-title text-white text-5xl lg:text-8xl font-black mb-6 leading-none">
          {{ h.campaignName }}
        </h1>
        @if (h.description) {
          <p class="hero-desc text-white/80 text-lg lg:text-xl mb-8 max-w-lg">
            {{ h.description }}
          </p>
        }
        <div class="flex flex-wrap gap-4">
          <a href="/catalogo" class="hero-btn bg-white text-[#1a237e] px-8 py-4 font-bold text-sm tracking-wide hover:bg-gray-100 transition-colors flex items-center gap-2">
            {{ h.ctaText }}
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </a>
          @if (h.videoUrl) {
            <button class="hero-btn border-2 border-white text-white px-8 py-4 font-bold text-sm tracking-wide hover:bg-white hover:text-[#1a237e] transition-colors flex items-center gap-3">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              VER VIDEO
            </button>
          }
        </div>
      </div>
    </div>
  }
</section>
